version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Celery Demo – Docker Compose
#  Services:
#    rabbitmq    – RabbitMQ 3 with Management UI  (:15672)
#    web         – Django / Gunicorn              (:8000)
#    worker      – Celery worker (concurrency=4)
#    beat        – Celery Beat (periodic tasks)
#    flower      – Flower monitoring              (:5555)
# ─────────────────────────────────────────────────────────────────────────────

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: celery_demo.settings
  DJANGO_SECRET_KEY: celery-docker-secret-key-change-me
  DEBUG: "True"
  CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//

services:

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"        # AMQP
      - "15672:15672"      # Management UI  →  http://localhost:15672  (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Django web ────────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    command: [
      "sh", "-c",
      "python manage.py migrate --noinput && python manage.py setup_periodic_tasks && (python manage.py createsuperuser --noinput --username admin --email admin@example.com || true) && gunicorn celery_demo.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    ]
    environment:
      <<: *django-env
      DJANGO_SUPERUSER_PASSWORD: admin
    ports:
      - "8080:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: >
      celery -A celery_demo worker
        --loglevel=info
        --concurrency=4
        --events
        --hostname=worker@%h
    environment:
      <<: *django-env
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Celery Beat ───────────────────────────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: >
      celery -A celery_demo beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *django-env
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      web:
        condition: service_started

  # ── Flower ────────────────────────────────────────────────────────────────
  flower:
    build: .
    restart: unless-stopped
    command: >
      celery -A celery_demo flower
        --port=5555
        --broker=amqp://guest:guest@rabbitmq:5672//
        --persistent=True
        --db=/app/flower.db
        --max_tasks=500
        --url_prefix=
    environment:
      <<: *django-env
    ports:
      - "5555:5555"        # Flower UI  →  http://localhost:5555
    volumes:
      - .:/app
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  static_files:
